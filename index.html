<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sandbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fdf6ef;
      --card:    #ffffff;
      --text:    #2b2320;
      --muted:   #9b8e88;
      --border:  rgba(0,0,0,0.07);

      --mint:    #b8f0da; --mint-s: #e6faf3;  --mint-d: #2d7a5a;
      --peach:   #ffd5bc; --peach-s: #fff1ea; --peach-d: #a04a1f;
      --lav:     #d9d0f8; --lav-s: #f0eeff;   --lav-d: #4a36a0;
      --sky:     #bde6fd; --sky-s: #e8f7ff;   --sky-d: #1a6b9a;
      --butter:  #fce9a0; --butter-s: #fffae6;--butter-d: #7a5b00;
      --rose:    #ffc8d1; --rose-s: #fff0f3;  --rose-d: #9a1f35;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }

    /* blobs */
    .blob {
      position: fixed; border-radius: 50%; pointer-events: none;
      z-index: 0; filter: blur(80px); opacity: .5;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .b1 { width:520px;height:520px;background:var(--mint);   top:-160px;left:-130px; }
    .b2 { width:460px;height:460px;background:var(--lav);    top:40%;right:-150px; animation-delay:-9s; }
    .b3 { width:380px;height:380px;background:var(--peach);  bottom:-110px;left:28%; animation-delay:-4s; }
    @keyframes drift { to { transform: translate(30px,20px) scale(1.07); } }

    .wrap { position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 30px; }

    /* header */
    header { padding:88px 0 60px; display:flex;flex-direction:column;gap:18px; animation:up .6s ease both; }
    .eyebrow {
      font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
      display:flex;align-items:center;gap:10px;
    }
    .eyebrow::before {
      content:'';width:28px;height:2px;border-radius:2px;
      background:linear-gradient(90deg,#f97b5b,#c66ef5);
    }
    h1 {
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:clamp(3.4rem,9vw,7rem);line-height:.9;letter-spacing:-.03em;
    }
    h1 span {
      background:linear-gradient(135deg,#f97b5b 0%,#c66ef5 60%,#4fc3f7 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .sub { font-size:.92rem;color:var(--muted);line-height:1.75;max-width:400px;font-weight:300; }

    /* count badge */
    .count-row { padding:4px 0 36px; animation:up .6s .1s ease both; }
    .count-badge {
      display:inline-flex;align-items:baseline;gap:8px;
      background:var(--card);border:1.5px solid var(--border);
      border-radius:100px;padding:8px 20px;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }
    .count-num { font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text); }
    .count-lbl { font-size:.78rem;color:var(--muted); }

    /* grid */
    .grid {
      display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:18px;padding-bottom:90px;
    }

    /* card */
    .card {
      background:var(--card);border:1.5px solid var(--border);border-radius:20px;
      padding:26px;text-decoration:none;color:inherit;
      display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;
      transition:transform .22s,box-shadow .22s,border-color .22s;
      box-shadow:0 2px 12px rgba(0,0,0,.04);
      animation:up .5s ease both;
    }
    .card:hover { transform:translateY(-5px);box-shadow:0 16px 44px rgba(0,0,0,.1);border-color:rgba(0,0,0,.12); }

    .stripe { position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0; }
    .s-mint   { background:linear-gradient(90deg,var(--mint),var(--sky)); }
    .s-peach  { background:linear-gradient(90deg,var(--peach),var(--rose)); }
    .s-lav    { background:linear-gradient(90deg,var(--lav),var(--mint)); }
    .s-sky    { background:linear-gradient(90deg,var(--sky),var(--lav)); }
    .s-butter { background:linear-gradient(90deg,var(--butter),var(--peach)); }
    .s-rose   { background:linear-gradient(90deg,var(--rose),var(--lav)); }

    .card-top { display:flex;align-items:flex-start;justify-content:space-between; }
    .icon {
      width:46px;height:46px;border-radius:13px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.4rem;border:1.5px solid rgba(0,0,0,.06);
    }
    .i-mint   { background:var(--mint-s); }
    .i-peach  { background:var(--peach-s); }
    .i-lav    { background:var(--lav-s); }
    .i-sky    { background:var(--sky-s); }
    .i-butter { background:var(--butter-s); }
    .i-rose   { background:var(--rose-s); }

    .arrow {
      width:30px;height:30px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:.9rem;color:var(--muted);background:var(--bg);
      opacity:0;transform:translate(-3px,3px);transition:opacity .2s,transform .2s;
    }
    .card:hover .arrow { opacity:1;transform:translate(0,0); }

    .card-title { font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;line-height:1.3; }
    .card-desc  { font-size:.82rem;color:var(--muted);line-height:1.75;font-weight:300; }

    /* footer */
    footer {
      position:relative;z-index:1;border-top:1.5px solid var(--border);
      padding:26px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    }
    .foot-txt { font-size:.78rem;color:var(--muted); }
    .foot-accent { color:var(--peach-d);font-weight:500; }

    @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:600px){ h1{font-size:3rem;} .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="wrap">

  <header>
    <div class="eyebrow">my mini projects</div>
    <h1>Sand<span>box</span></h1>
    <p class="sub">A place where ideas get messy, experiments ship, and half-finished things are welcome.</p>
  </header>

  <div class="count-row">
    <div class="count-badge">
      <span class="count-num" id="cnt">1</span>
      <span class="count-lbl">projects</span>
    </div>
  </div>

  <div class="grid" id="grid">

    <a class="card" href="pomodoro-app/pomodoro.html" style="animation-delay:.04s">
      <div class="stripe s-mint"></div>
      <div class="card-top"><div class="icon i-mint"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M574.5-774.5Q560-789 560-810t14.5-35.5Q589-860 610-860t35.5 14.5Q660-831 660-810t-14.5 35.5Q631-760 610-760t-35.5-14.5Zm0 660Q560-129 560-150t14.5-35.5Q589-200 610-200t35.5 14.5Q660-171 660-150t-14.5 35.5Q631-100 610-100t-35.5-14.5Zm160-520Q720-649 720-670t14.5-35.5Q749-720 770-720t35.5 14.5Q820-691 820-670t-14.5 35.5Q791-620 770-620t-35.5-14.5Zm0 380Q720-269 720-290t14.5-35.5Q749-340 770-340t35.5 14.5Q820-311 820-290t-14.5 35.5Q791-240 770-240t-35.5-14.5Zm60-190Q780-459 780-480t14.5-35.5Q809-530 830-530t35.5 14.5Q880-501 880-480t-14.5 35.5Q851-430 830-430t-35.5-14.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880v80q-134 0-227 93t-93 227q0 134 93 227t227 93v80Zm-56.5-343.5Q400-447 400-480q0-5 .5-10.5T403-501l-83-83 56-56 83 83q4-1 21-3 33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400q-33 0-56.5-23.5Z"/></svg></div><span class="arrow">↗</span></div>
      <div class="card-title">POMODORO APP</div>
      <div class="card-desc">Efficient way to study with pomodoro technique</div>
    </a>  

  </div>

  <footer>
    <span class="foot-txt"><span class="foot-accent" id="footCnt">1</span> projects in the sandbox</span>
    <span class="foot-txt" id="clock"></span>
  </footer>

</div>

<script>
  const tick = () => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  };
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
